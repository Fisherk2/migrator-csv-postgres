table: orders
description: "├Υrdenes de compra del e-commerce con estado y montos"
version: "1.0.0"

# Columnas del dominio con sus reglas de validaci├│n
columns:
  id:
    type: integer
    required: false
    allowed_null: true
    business_rule: "Identificador ├║nico autoincremental, generado por BD"
    validation_message: "ID debe ser entero positivo o nulo para auto-generaci├│n"

  customer_id:
    type: integer
    required: true
    allowed_null: false
    format: "positive_integer"
    business_rule: "Referencia al cliente que realiz├│ la compra, debe existir en customers"
    validation_message: "Customer ID '{value}' inv├κlido en fila {row}. Se espera entero positivo"

  order_date:
    type: datetime
    required: false
    allowed_null: true
    business_rule: "Fecha en que se realiz├│ la orden, default fecha actual"
    validation_message: "Fecha de orden '{value}' inv├κlida en fila {row}. Se espera datetime v├κlido"

  total_amount:
    type: float
    required: true
    allowed_null: false
    format: "positive_number"
    business_rule: "Monto total de la orden, no puede ser negativo"
    validation_message: "Total '{value}' inv├κlido en fila {row}. Se espera n├║mero positivo"

  status:
    type: string
    required: true
    allowed_null: false
    format: "order_status"
    business_rule: "Estado actual del proceso, valores v├κlidos predefinidos"
    validation_message: "Status '{value}' inv├κlido en fila {row}. Se espera: pending, processing, shipped, delivered, cancelled"